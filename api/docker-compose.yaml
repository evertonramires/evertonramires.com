services:
  bun:
    build: .
    container_name: api
    restart: unless-stopped

    expose:
      - "8000"

    environment:
      - CHOKIDAR_USEPOLLING=true

    command: fastapi dev main.py --host 0.0.0.0 --port 8000 

    volumes:
      - ./:/api

    networks:
      - web

    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://127.0.0.1:8000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  web:
    external: true
    name: web
