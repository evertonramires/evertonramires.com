services:
  bun:
    build: .
    container_name: evertonramires
    restart: unless-stopped

    expose:
      - "3000"

    environment:
      - CHOKIDAR_USEPOLLING=true

    command: bun run start --host 0.0.0.0 --port 3000

    volumes:
      - ./:/app
      - node_modules:/app/node_modules
      - bun_cache:/root/.bun

    networks:
      - web

    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  node_modules:
  bun_cache:

networks:
  web:
    external: true
    name: web
